name: Build add-on

# Continuous integration only: compile every source file and build the
# .nvda-addon so breakages are caught early. Release assets are managed manually
# with a verified SHA256 (the Add-on Store references that exact checksum), so
# this workflow deliberately does NOT upload to or modify GitHub Releases.

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all sources
        shell: bash
        run: |
          python -c "import compileall, sys; sys.exit(0 if compileall.compile_dir('addon', quiet=1) else 1)"

      - name: Build the .nvda-addon package
        run: python build.py --no-copy

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sarvam-ai-addon
          path: "*.nvda-addon"
